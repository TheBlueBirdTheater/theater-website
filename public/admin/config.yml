  - name: gallery
    label: Gallery
    folder: src/content/gallery
    create: true
    slug: "{{slug}}"
    extension: yaml
    format: yaml
    fields:
      - {
          label: Photo,
          name: photo,
          widget: image,
          media_folder: /src/assets/images/gallery,
          public_folder: ../../assets/images/gallery,
        }
      - {
          label: Alt Text,
          name: alt,
          widget: string,
          hint: "Describe the photo for accessibility.",
        }
      - { label: Caption, name: caption, widget: string, required: false }

  - name: contact
    label: Contact Info
    files:
      - name: contact
        label: Contact Info
        file: src/content/contact/contact.yaml
        fields:
          - { label: Phone, name: phone, widget: string }
          - { label: Email, name: email, widget: string }
          - label: Address
            name: address
            widget: object
            fields:
              - { label: Street Address, name: line1, widget: string }
              - { label: City, name: city, widget: string }
              - { label: State, name: state, widget: string }
              - {
                  label: ZIP,
                  name: zip,
                  widget: string,
                  pattern: ["^\\d{5}(-\\d{4})?$", "Format: 12345 or 12345-6789"],
                }
          - {
              label: Map Latitude,
              name: mapLat,
              widget: number,
              value_type: float,
              min: -90,
              max: 90,
              required: false,
              hint: "Used for the venue map embed. Leave blank to hide the map.",
            }
          - {
              label: Map Longitude,
              name: mapLng,
              widget: number,
              value_type: float,
              min: -180,
              max: 180,
              required: false,
              hint: "Used for the venue map embed. Leave blank to hide the map.",
            }
          - label: Social Links
            name: socials
            widget: list
            fields:
              - { label: Platform, name: platform, widget: string }
              - { label: URL, name: url, widget: string }

  - name: history
    label: History
    files:
      - name: history
        label: Building & Company History
        file: src/content/history/history.yaml
        fields:
          - {
              label: Intro,
              name: intro,
              widget: text,
              hint: "Homepage teaser + About page opening line.",
            }
          - label: Milestones
            name: milestones
            widget: list
