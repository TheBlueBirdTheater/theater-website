              widget: string,
              pattern:
                ["^\\d{4}-\\d{2}-\\d{2}$", "Format: YYYY-MM-DD, e.g. 2026-12-10"],
              hint: "Format: YYYY-MM-DD, e.g. 2026-12-10",
            }
          - label: Times
            name: times
            widget: list
            required: false
            hint: "Leave empty if the time is still TBA."
            fields:
