# base_url is the live Netlify site (see netlify/functions/auth.ts + netlify/functions/callback.ts
# for the OAuth proxy this points at). If this ever moves to a custom domain, update base_url here
# and the GitHub OAuth App's callback URL to match, or login will fail.
backend:
  name: github
  repo: TheBlueBirdTheater/theater-website
  branch: main
  base_url: https://bluebirdtheater.netlify.app/
  auth_endpoint: auth

# Lets editors test against the local git working tree via `npm run cms:local` (decap-server),
# without needing GitHub OAuth. Harmless to leave enabled in production config — Decap only
# uses the local backend when the admin UI itself is opened from localhost.
local_backend: true

# Saves become drafts (Draft -> In Review -> Ready) on their own branch instead of committing
# straight to `branch: main`. Lets editors make and save several changes across sections without
# each save going live, then publish selected entries from the CMS's Workflow board when ready.
publish_mode: editorial_workflow

media_folder: public/images/uploads
public_folder: /images/uploads

collections:
  - name: shows
    label: Shows
    folder: src/content/shows
    create: true
    slug: "{{slug}}"
    extension: yaml
    format: yaml
    media_folder: /src/assets/images/shows
    public_folder: ../../assets/images/shows
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Subtitle, name: subtitle, widget: string, required: false }
      - { label: Synopsis, name: synopsis, widget: text }
      - { label: Poster Image, name: posterImage, widget: image, required: false }
      - { label: Poster Alt Text, name: posterAlt, widget: string }
      - label: Run Dates
        name: runDates
        widget: list
        hint: "Leave the whole list empty if no dates are set yet (TBA)."
        fields:
          - {
              label: Date,
              name: date,
              widget: string,
              pattern:
                ["^\\d{4}-\\d{2}-\\d{2}$", "Format: YYYY-MM-DD, e.g. 2026-12-10"],
              hint: "Format: YYYY-MM-DD, e.g. 2026-12-10",
            }
          - {
              label: Time,
              name: time,
              widget: string,
              required: false,
              pattern: ["^\\d{2}:\\d{2}$", "Format: HH:mm (24-hour), e.g. 19:30"],
              hint: "Format: HH:mm (24-hour), e.g. 19:30. Leave blank if the time isn't set yet (TBA).",
            }
          - {
              label: Label,
              name: label,
              widget: string,
              required: false,
              hint: 'e.g. "Opening Night", "Matinee"',
            }
          - {
              label: Accessibility Tag,
              name: accessibilityTag,
              widget: string,
              required: false,
              hint: 'e.g. "ASL-Interpreted", "Sensory-Friendly" — leave blank if not applicable to this specific performance.',
            }
      - { label: Venue, name: venue, widget: string }
      - { label: Ticket URL, name: ticketUrl, widget: string }
      - {
          label: Ticket Price,
          name: ticketPrice,
          widget: string,
          required: false,
          hint: 'e.g. "$15" — leave blank if free or not yet set. Shown in ticket search results.',
        }
      - {
          label: Dress Code,
          name: dressCode,
          widget: string,
          required: false,
          hint: 'e.g. "Cocktail attire" — leave blank if there is no dress code.',
        }
      - {
          label: Doors Open (minutes before showtime),
          name: doorsOpenMinutesBefore,
          widget: number,
          value_type: int,
          required: false,
          hint: 'e.g. "30" — leave blank if unknown.',
        }
      - {
          label: Run Time,
          name: runTime,
          widget: string,
          required: false,
          hint: 'e.g. "2 hours, incl. one 15-minute intermission" — leave blank if unknown.',
        }
      - {
          label: Concessions Note,
          name: concessionsNote,
          widget: string,
          required: false,
          hint: 'e.g. "Snacks and drinks available in the lobby" — leave blank if not applicable.',
        }
      - label: Accessibility
        name: accessibility
        widget: object
        required: false
        fields:
          - {
              label: Wheelchair-Accessible Seating,
              name: wheelchairSeating,
              widget: boolean,
              default: false,
              required: false,
            }
          - {
              label: Assistive Listening Devices,
              name: assistiveListening,
              widget: boolean,
              default: false,
              required: false,
            }
          - {
              label: ASL Interpretation Available on Request,
              name: aslAvailable,
              widget: boolean,
              default: false,
              required: false,
            }
          - {
              label: Audio Description Available on Request,
              name: audioDescriptionAvailable,
              widget: boolean,
              default: false,
              required: false,
            }
          - {
              label: Additional Note,
              name: note,
              widget: string,
              required: false,
              hint: "Anything not covered above.",
            }
      - label: Auditions
        name: auditions
        widget: object
        required: false
        hint: "Only fill this in if this specific show has its own audition dates. General audition info always shows on the Auditions page separately."
        fields:
          - label: Audition Dates
            name: auditionDates
            widget: list
            required: false
            hint: "Leave empty if audition dates haven't been announced yet (TBA) — the Auditions page will show 'To be announced' until this is filled in."
            fields:
              - {
                  label: Date,
                  name: date,
                  widget: string,
                  pattern:
                    [
                      "^\\d{4}-\\d{2}-\\d{2}$",
                      "Format: YYYY-MM-DD, e.g. 2026-12-10",
                    ],
                  hint: "Format: YYYY-MM-DD, e.g. 2026-12-10",
                }
              - {
                  label: Time,
                  name: time,
                  widget: string,
                  pattern:
                    ["^\\d{2}:\\d{2}$", "Format: HH:mm (24-hour), e.g. 19:30"],
                  hint: "Format: HH:mm (24-hour), e.g. 19:30",
                }
              - {
                  label: Location,
                  name: location,
                  widget: string,
                  required: false,
                }
          - {
              label: Callback Date,
              name: callbackDate,
              widget: string,
              required: false,
              pattern:
                [
                  "^\\d{4}-\\d{2}-\\d{2}$",
                  "Format: YYYY-MM-DD, e.g. 2026-12-10",
                ],
              hint: "Format: YYYY-MM-DD, e.g. 2026-12-10",
            }
          - label: Requirements
            name: requirements
            widget: list
            required: false
            field: { label: Requirement, name: value, widget: string }
          - {
              label: Sign-Up URL,
              name: signUpUrl,
              widget: string,
              required: false,
            }
          - {
              label: Contact Email,
              name: contactEmail,
              widget: string,
              required: false,
            }
          - {
              label: Notes,
              name: notes,
              widget: text,
              required: false,
              hint: 'Anything else auditioners should know, e.g. "Prepare 32 bars of a song."',
            }
      - {
          label: Performing Group,
          name: performingGroup,
          widget: string,
          required: false,
          hint: "Only needed if this show is NOT an Orangeburg Part-Time Players production — e.g. a guest dance recital or comedy night hosted at the Blue Bird Theatre.",
        }
      - label: Cast
        name: cast
        widget: list
        required: false
        field:
          {
            label: Cast Member,
            name: value,
            widget: string,
            hint: 'e.g. "[Actor Name] as [Character]"',
          }
      - label: Crew
        name: crew
        widget: list
        required: false
        field:
          {
            label: Crew Member,
            name: value,
            widget: string,
            hint: 'e.g. "Director: [Name]"',
          }

