              label: Donation Platform URL,
              name: donationPlatformUrl,
              widget: string,
              hint: "Third-party giving-page link, e.g. a Givebutter or Classy URL.",
            }
          - label: Giving Levels
            name: givingLevels
            widget: list
            fields:
              - { label: Name, name: name, widget: string }
              - {
                  label: Amount,
                  name: amount,
                  widget: string,
                  hint: 'e.g. "$25+"',
                }
              - label: Perks
                name: perks
                widget: list
                field: { label: Perk, name: value, widget: string }
          - label: Sponsorship Tiers
            name: sponsorshipTiers
            widget: list
            fields:
              - { label: Name, name: name, widget: string }
              - { label: Amount, name: amount, widget: string }
              - label: Benefits
                name: benefits
                widget: list
                field: { label: Benefit, name: value, widget: string }

  - name: getInvolved
    label: Get Involved Page Settings
    files:
      - name: getInvolved
        label: Get Involved Page Settings
        file: src/content/getInvolved/getInvolved.yaml
        fields:
          - { label: Volunteer Sign-Up URL, name: signUpUrl, widget: string }
          - label: Volunteer Roles
            name: roles
            widget: list
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }
              - {
                  label: Commitment,
                  name: commitment,
                  widget: string,
                  hint: 'e.g. "one show night per production"',
                }
              - {
                  label: Icon,
                  name: icon,
                  widget: string,
                  required: false,
                  hint: "Freeform label — not currently rendered on the site.",
                }
          - label: Steps
            name: steps
            widget: list
            hint: "Order here controls the numbered display order on the page — drag to reorder."
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }

  - name: extras
    label: Extra Page Copy
    files:
      - name: extras
        label: Extra Page Copy
        file: src/content/extras/extras.yaml
        fields:
          - {
              label: "Also at the Blue Bird (Shows page)",
              name: alsoAtTheBlueBird,
              widget: text,
            }
          - label: Adult OPTP (Auditions page)
            name: adultOptp
            widget: object
            fields:
              - { label: Description, name: description, widget: text }
              - { label: Audition Window, name: auditionWindow, widget: string }
              - { label: Contact Email, name: contactEmail, widget: string }
          - label: Junior OPTP (Auditions page)
            name: juniorOptp
            widget: object
            fields:
              - { label: Age Range, name: ageRange, widget: string }
              - { label: Description, name: description, widget: text }
              - { label: Audition Window, name: auditionWindow, widget: string }
              - {
                  label: Performance Window,
                  name: performanceWindow,
                  widget: string,
                }
              - { label: Contact Email, name: contactEmail, widget: string }
