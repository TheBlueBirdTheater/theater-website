title: Steel Magnolias
subtitle: Written by Robert Harling
synopsis: A close-knit group of women gathers at Truvy's beauty salon in
  Chinquapin, Louisiana, sharing sharp wit, heartfelt advice, and unbreakable
  bonds. Amid weddings, laughter, and lively banter, joy gives way to
  heartbreak, revealing the resilience, love, and strength that carry these
  women through life's toughest moments.
