title: "LET IT BE ART! Harold Clurman's Life of Passion"
subtitle: Written and directed by U.S. Cultural Ambassador Ronald Rand
synopsis: "An unforgettable evening of humor and storytelling as Ronald Rand takes the stage as theater legend Harold Clurman, the Elder Statesman of the American Theatre. Audiences are transported to New York City, Paris, and Hollywood to meet luminaries including Stella Adler, Lee Strasberg, Constantin Stanislavsky, Marlon Brando, Clifford Odets, Katharine Hepburn, and more. Date to be announced."
