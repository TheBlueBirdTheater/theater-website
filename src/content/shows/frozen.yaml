synopsis: Frozen is the timeless tale of two sisters, Elsa and Anna, torn apart
  by a mysterious secret. As Elsa's powers grow beyond her control, Anna embarks
  on an epic journey to save her sister and their kingdom. With all the beloved
  songs from the film plus new music written for Broadway, Frozen is a thrilling
  adventure filled with heart, humor, and theatrical magic.
