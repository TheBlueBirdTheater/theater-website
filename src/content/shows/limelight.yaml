title: "BlueBird Spotlight Series: Limelight"
subtitle: Written and directed by Beth Watkins-Brown
synopsis: An original musical by Beth Watkins-Brown, with music by Donald Lee,
  Jr., presented as part of the Blue Bird Theatre's spotlight on local
  playwrights. Set in a late-night jazz club, club owner Alice Jackson fights to
  keep her business and her marriage intact as ambition, jealousy, and betrayal
  surface among performers and staff.
