slug: getInvolved
signUpUrl: "https://www.facebook.com/BluebirdtheatreOrangeburgSC"
intro: "Each production at the Blue Bird is a labor of love, and volunteers keep the show going. No experience is necessary, and there is a place for every interest, both on stage and behind the scenes."
roles:
  - title: Ushering and Seating
    description: "Welcome patrons, hand out programs, and help guests find their seats before the show and at intermission."
    commitment: "One or more performance nights per production"
    icon: ticket
  - title: Set Construction
    description: "Help design, build, and paint the sets that bring each production to life. Carpentry skills are welcome but not required."
    commitment: "Flexible, during the weeks leading up to a show"
    icon: hammer
  - title: Costumes
    description: "Sew, fit, and organize costumes for the cast. Sewing experience is helpful, but there are tasks for every skill level."
    commitment: "Flexible, during the rehearsal and production period"
    icon: shirt
  - title: Box Office
    description: "Assist patrons with ticket sales and will-call, and help keep the lobby running smoothly on performance nights."
    commitment: "One or more performance nights per production"
    icon: ticket
  - title: Backstage Crew
    description: "Support the production behind the scenes by assisting with props, scene changes, and running the show during performances."
    commitment: "Tech week and performance nights"
    icon: clapperboard
  - title: On Stage
    description: "Audition for a role and perform with the Orangeburg Part-Time Players. New performers of all experience levels are welcome."
    commitment: "Rehearsals plus the performance run"
    icon: star
steps:
  - title: "Follow us on Facebook"
    description: "Follow the Blue Bird Theatre on Facebook to receive updates about auditions, meetings, volunteer opportunities, and upcoming shows."
  - title: "Choose how you want to help"
    description: "Decide whether you would like to perform on stage or lend a hand behind the scenes with sets, costumes, box office, ushering, or backstage crew. No experience is necessary."
  - title: "Reach out or attend a meeting"
    description: "Contact us by phone, email, or Facebook, or drop in to an Executive Board meeting, held the first Thursday of every month at 7 p.m. at the theater. All are welcome."
  - title: "Join the OPTP"
    description: "Become a member to support the theater and stay connected. Memberships can be purchased online through TicketLeap or by mail."
