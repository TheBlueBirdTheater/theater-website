question: "What is the relationship between the Blue Bird Theatre and the OPTP?"
answer: "The Blue Bird Theatre is the venue in downtown Orangeburg, and the Orangeburg Part-Time Players (OPTP) is the all-volunteer community theater company that calls it home. The OPTP produces a full season of live shows performed by local adults, and its youth program, the Junior Orangeburg Part-Time Players, gives area kids the chance to perform for the Orangeburg community."
category: Venue
