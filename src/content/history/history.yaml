intro: "The historic Blue Bird Theatre is downtown Orangeburg's live performance venue, and the Orangeburg Part-Time Players (OPTP) is the all-volunteer community theater company that calls it home. Together they bring live theater to Orangeburg, with productions performed by local adults and, through the Junior Orangeburg Part-Time Players, by area youth."
milestones:
  - year: "1916"
    heading: "The original Bluebird opens"
    body: "The Standard Entertainment Company announced the opening of the Bluebird Theatre in September 1916. Located on East Russell Street with James Izlar Sims serving as president, it became a popular site for vaudeville-style traveling shows and, in later years, was remembered as the venue for Bob Hope's first road show in this country after his arrival from England."
  - year: "1941"
    heading: "The Edisto Theatre is built"
    body: "A brand new movie theater, The Edisto, opened in 1941 on Russell Street. Operated by the Sims family, it later passed to another operator before closing in the 1980s, after which the building was used only for storage."
  - year: "1981"
    heading: "The Orangeburg Part-Time Players are founded"
    body: "The company grew out of Joel Mason's production of God's Favorite, which opened on August 28, 1981. The cast became the charter members, and the group organized under its first president, Jeffrey P. Weaver. In May 1983 the Players staged their first musical, My Fair Lady."
  - year: "1996"
    heading: "A permanent home is donated"
    body: "In December 1996, James H. Gressette, Jr., a member of the Orangeburg Part-Time Players and owner of the former Edisto building, donated the theater to the company. At his request, it was named the Blue Bird in honor of his grandfather, James Izlar Sims, Sr., one of the owners of the original Bluebird."
  - year: "1998"
    heading: "The renovated Blue Bird reopens"
    body: "Following extensive renovation and restoration completed largely by members and supported by donated materials, work, and funds from the community, the newly renovated Blue Bird Theatre held its grand opening in June 1998."
  - year: "2019"
    heading: "Lobby and auditorium remodeled"
    body: "The theater lobby and auditorium were completely remodeled, further improving the patron experience at the Blue Bird. Since its founding, the Orangeburg Part-Time Players has staged more than 150 productions, with the Junior Orangeburg Part-Time Players adding some 50 more."
